<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EgoKnowledge · 知识图谱 demo</title>
  <meta name="description" content="ego 知识库前端 demo · 多视图（图谱 / 搜索 / 深读 / 仪表盘）">
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="styles/tokens.css">
  <link rel="stylesheet" href="styles/base.css">
  <link rel="stylesheet" href="views/graph/graph.css">
  <link rel="stylesheet" href="views/search/search.css">
  <link rel="stylesheet" href="views/detail/detail.css">
  <link rel="stylesheet" href="views/dashboard/dashboard.css">
  <link rel="stylesheet" href="views/structure-map/structure-map.css">
  <link rel="stylesheet" href="views/gallery/gallery.css">
  <link rel="stylesheet" href="views/reader/reader.css">
  <link rel="stylesheet" href="views/timeline/timeline.css">
  <link rel="stylesheet" href="views/review/review.css">
  <link rel="stylesheet" href="views/explore/explore.css">
  <link rel="stylesheet" href="views/promotion-river/promotion-river.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.30.2/cytoscape.min.js"
          crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  <!-- d3 · 持续物理引擎（v2.8 取代 fcose 静态布局：节点斥力 / 边弹簧分级 / collide 实时排斥 / 拖拽 reheat）。
       用 d3 完整包而非单 d3-force：d3-force UMD 假设 d3.timer 已存在（d3-force 依赖 d3-timer/d3-quadtree/d3-dispatch），
       单包加载会报 "r.timer is not a function"。完整包一次性满足所有依赖，注册到 window.d3 命名空间，
       与 cytoscape 渲染层解耦；加载失败/不可用自动降级 fcose 静态。 -->
  <script src="https://cdn.jsdelivr.net/npm/d3@7.9.0/dist/d3.min.js"
          crossorigin="anonymous" referrerpolicy="no-referrer"></script>
</head>
<body>
<div id="app">
  <header class="topbar">
    <div class="brand">
      <span class="brand-mark" aria-hidden="true">◆</span>
      <span class="brand-name">EgoKnowledge</span>
      <span class="brand-sub">知识图谱 · demo</span>
    </div>

    <nav class="nav-tabs" role="navigation" aria-label="视图切换">
      <a class="nav-tab" href="#/dashboard" data-view="dashboard">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <rect x="4" y="4" width="7" height="7" rx="1"/>
          <rect x="13" y="4" width="7" height="4" rx="1"/>
          <rect x="13" y="11" width="7" height="9" rx="1"/>
          <rect x="4" y="14" width="7" height="6" rx="1"/>
        </svg>
        <span>仪表盘</span>
      </a>
      <a class="nav-tab" href="#/structure-map" data-view="structure-map">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <circle cx="6" cy="6" r="2"/>
          <circle cx="6" cy="12" r="2"/>
          <circle cx="6" cy="18" r="2"/>
          <path d="M8 6h11M8 12h9M8 18h11"/>
        </svg>
        <span>结构地图</span>
      </a>
      <a class="nav-tab" href="#/gallery" data-view="gallery">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <rect x="3" y="4" width="5" height="5" rx="1"/>
          <rect x="9.5" y="4" width="5" height="5" rx="1"/>
          <rect x="16" y="4" width="5" height="5" rx="1"/>
          <rect x="3" y="15" width="5" height="5" rx="1"/>
          <rect x="9.5" y="15" width="5" height="5" rx="1"/>
          <rect x="16" y="15" width="5" height="5" rx="1"/>
        </svg>
        <span>卡片画廊</span>
      </a>
      <a class="nav-tab" href="#/reader" data-view="reader">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <rect x="3" y="4" width="8" height="16" rx="1"/>
          <rect x="13" y="4" width="8" height="16" rx="1"/>
          <line x1="5.5" y1="8" x2="8.5" y2="8"/>
          <line x1="5.5" y1="11" x2="8.5" y2="11"/>
          <line x1="15.5" y1="8" x2="18.5" y2="8"/>
          <line x1="15.5" y1="11" x2="18.5" y2="11"/>
        </svg>
        <span>双栏阅读</span>
      </a>
      <a class="nav-tab" href="#/timeline" data-view="timeline">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <line x1="8" y1="4" x2="8" y2="20"/>
          <circle cx="8" cy="8" r="2"/>
          <circle cx="8" cy="14" r="2"/>
          <line x1="12" y1="8" x2="19" y2="8"/>
          <line x1="12" y1="14" x2="18" y2="14"/>
        </svg>
        <span>时间线</span>
      </a>
      <a class="nav-tab" href="#/review" data-view="review">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <rect x="4" y="5" width="4" height="4" rx="1"/>
          <rect x="4" y="11" width="4" height="4" rx="1"/>
          <rect x="4" y="17" width="4" height="4" rx="1"/>
          <line x1="11" y1="7" x2="19" y2="7"/>
          <line x1="11" y1="13" x2="19" y2="13"/>
          <line x1="11" y1="19" x2="16" y2="19"/>
        </svg>
        <span>复核队列</span>
      </a>
      <a class="nav-tab" href="#/explore" data-view="explore">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <circle cx="12" cy="12" r="9"/>
          <polygon points="12,7 14.5,12 12,17 9.5,12"/>
        </svg>
        <span>知识漫步</span>
      </a>
      <a class="nav-tab" href="#/promotion-river" data-view="promotion-river">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <circle cx="4" cy="15" r="1.6"/>
          <circle cx="10" cy="11" r="2"/>
          <circle cx="16" cy="7.5" r="2.2"/>
          <circle cx="20.5" cy="5" r="1.3" opacity="0.5"/>
          <path d="M5.4 14.2L8.6 11.8M11.8 10.2L14.2 8.2M17.8 6.8L19.6 5.6"/>
        </svg>
        <span>升格河流</span>
      </a>
      <a class="nav-tab" href="#/graph" data-view="graph">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <circle cx="6" cy="6" r="2.5"/>
          <circle cx="18" cy="6" r="2.5"/>
          <circle cx="12" cy="18" r="2.5"/>
          <line x1="7.8" y1="7.5" x2="10.5" y2="16"/>
          <line x1="16.2" y1="7.5" x2="13.5" y2="16"/>
          <line x1="8.5" y1="6" x2="15.5" y2="6"/>
        </svg>
        <span>图谱</span>
      </a>
      <a class="nav-tab" href="#/search" data-view="search">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <circle cx="10.5" cy="10.5" r="6.5"/>
          <line x1="15.5" y1="15.5" x2="20" y2="20"/>
        </svg>
        <span>搜索</span>
      </a>
    </nav>

    <div class="topbar-stats" aria-live="polite">
      <span><b id="stats-node">0</b> 节点</span>
      <span><b id="stats-edge">0</b> 关系</span>
      <span><b id="stats-iso">0</b> 孤立</span>
    </div>
  </header>

  <main id="view-root" role="main"></main>

  <!-- detail 弹窗容器：从任意视图点节点唤起，覆盖主视图带遮罩。
       由 app.js switchView 在 view==='detail' 时挂载 detail 模块到此；
       × 关闭回主视图（store.currentView），后退按钮走浏览器历史。 -->
  <div id="detail-modal" class="detail-modal" hidden role="dialog" aria-modal="true" aria-label="深读详情"></div>

  <noscript>
    <div class="overlay overlay-error">
      <span>需要启用 JavaScript</span>
      <span class="muted">本 demo 依赖 ES modules + cytoscape.js</span>
    </div>
  </noscript>
</div>

<script src="data.js"></script>
<script type="module" src="app.js"></script>
</body>
</html>
